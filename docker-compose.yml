version: '3.8'
services:

  mysql-db:
    image: mysql:8.0
    container_name: flex_studio_mysql
    restart: always
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: FlexDB
    volumes:
      - mysql_data:/var/lib/mysql

  redis-db:
    image: redis:alpine
    container_name: flex_studio_redis
    restart: always
    ports:
      - '6379:6379' 

volumes:
  mysql_data: